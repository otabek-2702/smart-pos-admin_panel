  <style>/* ============================================================
   ALPHA POS — DESIGN TOKENS
   High-contrast minimalism. Light-first, dark via [data-theme].
   All values are named so they map 1:1 to Vuetify/Quasar theme keys.
   ============================================================ */

:root {
  /* ---- Type families ---- */
  --font-sans: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* ---- Type scale (px / line-height) ---- */
  --fs-display: 32px;  --lh-display: 40px;
  --fs-h1: 24px;       --lh-h1: 32px;
  --fs-h2: 19px;       --lh-h2: 28px;
  --fs-h3: 15px;       --lh-h3: 22px;
  --fs-body: 14px;     --lh-body: 22px;
  --fs-sm: 13px;       --lh-sm: 20px;
  --fs-label: 12px;    --lh-label: 16px;
  --fs-micro: 11px;    --lh-micro: 14px;

  <style>/* ============================================================

  <style>/* ============================================================
   ALPHA POS — motion layer (CSS)
   Compositor-only: animates transform + opacity exclusively.

   IMPORTANT robustness rule: entrance reveals use TRANSITIONS
   (not @keyframes). A transition that can't run — e.g. in a
   hidden/background tab where the engine is paused — still
   resolves to its END (visible) state, so content is NEVER
   stranded invisible. Keyframe entrances with fill:backwards
   would hold the hidden frame, so we avoid them for content.

   All gated behind prefers-reduced-motion.
   ============================================================ */

@media (prefers-reduced-motion: no-preference) {

  /* ---- Entrance: armed by html.anim, revealed by html.anim.rin ----
     Resting (no .anim) = fully visible. So if JS never runs, content
     shows normally. .anim arms the hidden state; .rin reveals it. */
  html.anim .page__head,
  html.anim .grid > *,
  html.anim .page > .card {
    opacity: 0;
    transform: translateY(12px);
  }
  .page__head,
  .grid > *,
  .page > .card {
    transition: opacity .5s cubic-bezier(.2, .8, .2, 1), transform .5s cubic-bezier(.2, .8, .2, 1);
    will-change: opacity, transform;
  }
  html.anim.rin .page__head,
  html.anim.rin .grid > *,
  html.anim.rin .page > .card {
    opacity: 1;
    transform: none;
  }

  /* staggered transition-delay for grid children */
  html.anim.rin .grid > *:nth-child(1)  { transition-delay: .03s; }
  html.anim.rin .grid > *:nth-child(2)  { transition-delay: .08s; }
  html.anim.rin .grid > *:nth-child(3)  { transition-delay: .13s; }
  html.anim.rin .grid > *:nth-child(4)  { transition-delay: .18s; }
  html.anim.rin .grid > *:nth-child(5)  { transition-delay: .22s; }
  html.anim.rin .grid > *:nth-child(6)  { transition-delay: .26s; }
  html.anim.rin .grid > *:nth-child(7)  { transition-delay: .30s; }
  html.anim.rin .grid > *:nth-child(8)  { transition-delay: .33s; }
  html.anim.rin .grid > *:nth-child(n+9){ transition-delay: .36s; }
  html.anim.rin .page > .card           { transition-delay: .06s; }

  /* ---- Chart internals: also transition-driven (see charts.jsx
     which toggles a `shown` flag via setTimeout, not rAF). ---- */
  .spark-line { transition: stroke-dashoffset 1s cubic-bezier(.4, 0, .2, 1) .1s; }
  .bar-rise   { transform-box: fill-box; transform-origin: bottom; transition: transform .6s cubic-bezier(.2, .8, .2, 1), opacity .4s ease; }
  .donut-in   { transform-box: fill-box; transform-origin: center; transition: transform .6s cubic-bezier(.2, .8, .2, 1), opacity .5s ease; }
  .hbar-fill  { transition: width .55s cubic-bezier(.2, .8, .2, 1), opacity .12s; }

  /* ---- Micro-interactions (transitions — always safe) ---- */
  .kpi { transition: box-shadow .18s ease, border-color .18s ease, transform .18s cubic-bezier(.2, .8, .2, 1); }
  .kpi:hover { transform: translateY(-3px); }
  .kpi__icon { transition: transform .2s cubic-bezier(.2, .8, .2, 1); }
  .kpi:hover .kpi__icon { transform: scale(1.08) rotate(-3deg); }

  .nav-item:active { transform: scale(.97); }

  .btn--primary:hover { transform: translateY(-1px); }
  .btn--primary:active { transform: translateY(0); }

  .card { transition: box-shadow .18s ease, border-color .18s ease; }
}

.md p:last-child { margin-bottom: 0; }

.composer__inner { max-width: 780px; margin: 0 auto; }

.composer__box:focus-within { border-color: var(--primary); box-shadow: var(--shadow-focus); }
.composer__ta { flex: 1; border: none; outline: none; background: transparent; resize: none; font-family: var(--font-sans); font-size: var(--fs-body); line-height: var(--lh-body); color: var(--text); max-height: 160px; padding: 7px 0; }
.composer__ta::placeholder { color: var(--text-tertiary); }
.composer__send { width: 40px; height: 40px; flex: 0 0 40px; border-radius: var(--r-sm); border: none; background: var(--surface-inset); color: var(--text-tertiary); display: grid; place-items: center; cursor: pointer; transition: all .14s; }
.composer__send.is-ready { background: var(--primary); color: var(--on-primary); }
.composer__send.is-ready:hover { background: var(--primary-hover); }
.composer__send.is-stop { background: var(--error-weak); color: var(--error); }
.composer__send.is-stop:hover { background: var(--error); color: #fff; }
.composer__send[disabled] { cursor: not-allowed; }
.composer__hint { text-align: center; font-size: var(--fs-label); color: var(--text-tertiary); margin-top: 9px; }

/* global "AI thinking" pill in the topbar */
.ai-pill { display: inline-flex; align-items: center; gap: 8px; height: 34px; padding: 0 12px; border-radius: var(--r-pill); background: var(--primary-weak); border: 1px solid var(--primary-border); color: var(--primary); font-size: var(--fs-sm); font-weight: var(--fw-semibold); cursor: pointer; transition: all .14s; }
.ai-pill:hover { background: var(--primary-weak-2); }

@media (max-width: 860px) {
  .aihist { width: 84px; flex-basis: 84px; }
  .aihist__search, .histitem__main, .histitem__meta, .aihist__label { display: none; }
  .aihist__top .btn span { display: none; }
}
