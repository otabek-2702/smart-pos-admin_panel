<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha POS — Admin Redesign</title>

  <script>
    (function () {
      try {
        var t = localStorage.getItem("alphapos-theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/app.css" />
  <link rel="stylesheet" href="styles/anim.css" />
  <link rel="stylesheet" href="styles/aichat.css" />
  <link rel="stylesheet" href="styles/datepicker.css" />
  <link rel="stylesheet" href="styles/dashboards.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
  <style>
    html, body, #root { min-height: 100vh; }
    #root { background: var(--bg); }
    .boot { display: grid; place-items: center; min-height: 100vh; color: var(--text-tertiary); font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="root"><div class="boot">Loading Alpha POS…</div></div>

  <template id="__bundler_thumbnail" data-bg-color="#3A5BDB">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="20" fill="#3A5BDB" />
      <g transform="translate(30,30)" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 38 V20 M14 38 V8 M26 38 V24 M38 38 V2" />
      </g>
    </svg>
  </template>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Plain JS helpers -->
  <script src="app/format.js"></script>
  <script src="app/data.js"></script>
  <script src="app/dashdata.js"></script>

  <!-- React component layers (order matters: primitives -> charts -> table -> shell -> pages -> mount) -->
  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/anim.jsx"></script>
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/datepicker.jsx"></script>
  <script type="text/babel" src="app/aichat.jsx"></script>
  <script type="text/babel" src="app/charts.jsx"></script>
  <script type="text/babel" src="app/charts2.jsx"></script>
  <script type="text/babel" src="app/affinity.jsx"></script>
  <script type="text/babel" src="app/table.jsx"></script>
  <script type="text/babel" src="app/shell.jsx"></script>
  <script type="text/babel" src="pages/DesignSystem.jsx"></script>
  <script type="text/babel" src="pages/dash/Shared.jsx"></script>
  <script type="text/babel" src="pages/dash/Executive.jsx"></script>
  <script type="text/babel" src="pages/dash/Sales.jsx"></script>
  <script type="text/babel" src="pages/dash/Operations.jsx"></script>
  <script type="text/babel" src="pages/dash/Products.jsx"></script>
  <script type="text/babel" src="pages/dash/Staff.jsx"></script>
  <script type="text/babel" src="pages/Dashboard.jsx"></script>
  <script type="text/babel" src="pages/Analytics.jsx"></script>
  <script type="text/babel" src="pages/Orders.jsx"></script>
  <script type="text/babel" src="pages/Users.jsx"></script>
  <script type="text/babel" src="pages/Shifts.jsx"></script>
  <script type="text/babel" src="pages/AIChat.jsx"></script>

  <script type="text/babel" data-presets="react">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ToastProvider><AIProvider><App /></AIProvider></ToastProvider>);
  </script>
</body>
</html>
