# Combined dev/staging stack — admin panel + alpha_pos backend + Postgres + Redis.
#
# Usage:
#   cp .env.example .env       # then edit SECRET_KEY, DB_PASSWORD, ALLOWED_HOSTS
#   docker compose up --build
#
# Panel served at  http://localhost:5181
# Backend exposed  http://localhost:8000  (also reached via panel /api proxy)
#
# For prod, point ALPHA_POS_DIR at the backend checkout and pin VITE_API_HOST="".

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-alpha_pos}
      POSTGRES_USER: ${DB_USER:-alpha_pos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-alpha_pos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      # Backend lives next to the panel. Override via ALPHA_POS_DIR env var
      # when the checkouts live elsewhere.
      context: ${ALPHA_POS_DIR:-../alpha_pos}
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: '${SECRET_KEY:?SECRET_KEY must be set in .env}'
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,panel}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-alpha_pos}
      DB_USER: ${DB_USER:-alpha_pos}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      USE_REDIS: ${USE_REDIS:-True}
      MEDIA_ROOT: /app/private_media
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5181}
    volumes:
      - media_data:/app/private_media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  panel:
    build:
      context: .
      args:
        # Empty so the panel uses relative /api/ which nginx proxies → web:8000.
        VITE_API_HOST: ""
        VITE_ALLOWED_API_HOSTS: ${VITE_ALLOWED_API_HOSTS:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_TRACES_RATE: ${VITE_SENTRY_TRACES_RATE:-0.1}
        VITE_SENTRY_REPLAY_RATE: ${VITE_SENTRY_REPLAY_RATE:-0}
        VITE_SENTRY_PII: ${VITE_SENTRY_PII:-false}
    restart: unless-stopped
    ports:
      - "${PANEL_PORT:-5181}:80"
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  media_data:
