# Admin panel nginx config — SPA fallback + /api reverse proxy to backend.
#
# Set BACKEND_HOST via docker-compose `extra_hosts` or service name.
# Default points to the `web` service in the bundled compose file.

upstream alpha_pos_backend {
    server web:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hardening — admin panel ships zero inline scripts past the Vite bundle.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # The Stock Items scanner needs this origin's camera; keep unrelated
    # sensors disabled while allowing the explicit user-granted camera flow.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self)" always;

    # Vite emits minified assets but no pre-compressed copies. Compress text at
    # the edge so the multi-megabyte initial bundle is not transferred raw.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/plain;

    # Hashed assets are immutable — let the browser cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy backend admin endpoints. /api covers /api/admins, /api/admins/stock,
    # /api/admins/hr, /api/admins/discounts, /api/admins/notifications,
    # /api/licensing, /api/fiscalization, /api/sync.
    location /api/ {
        proxy_pass         http://alpha_pos_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # File uploads (HR docs) can be a few MB.
        client_max_body_size 25m;
        proxy_read_timeout 60s;
    }

    # Real backend health probe used by the runtime host tester.
    location = /healthz {
        proxy_pass         http://alpha_pos_backend/healthz;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Container-local frontend health, deliberately independent of the API.
    location = /_panel_healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback: deep-link / refresh on any route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
