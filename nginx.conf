# Admin panel nginx config — SPA fallback + /api reverse proxy to backend.
#
# Set BACKEND_HOST via docker-compose `extra_hosts` or service name.
# Default points to the `web` service in the bundled compose file.

upstream alpha_pos_backend {
    server web:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hardening — admin panel ships zero inline scripts past the Vite bundle.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hashed assets are immutable — let the browser cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy backend admin endpoints. /api covers /api/admins, /api/admins/stock,
    # /api/admins/hr, /api/admins/discounts, /api/admins/notifications,
    # /api/licensing, /api/fiscalization, /api/sync.
    location /api/ {
        proxy_pass         http://alpha_pos_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # File uploads (HR docs) can be a few MB.
        client_max_body_size 25m;
        proxy_read_timeout 60s;
    }

    # Backend health probe — exposed so docker can hit /api/healthz if wanted.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback: deep-link / refresh on any route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
